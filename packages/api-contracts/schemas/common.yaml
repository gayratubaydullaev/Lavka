components:
  schemas:
    Product:
      type: object
      required: [id, name, price, stock, zone]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: object
          additionalProperties:
            type: string
          example:
            uz_cyrillic: "Олма"
            uz_latin: "Olma"
            ru: "Яблоко"
            en: "Apple"
        price:
          type: integer
          description: Price in UZS
        weight_g:
          type: integer
        is_halal:
          type: boolean
          default: false
        images:
          type: array
          items:
            type: string
            format: uri
        stock:
          type: integer
        zone:
          type: string
          enum: [A, B, C, D, E, F]
        category:
          type: string
        brand:
          type: string
        barcode:
          type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    DeliveryAddress:
      type: object
      required: [coordinates, landmark]
      properties:
        coordinates:
          type: object
          properties:
            lat:
              type: number
            lng:
              type: number
        mahalla_id:
          type: string
        landmark:
          type: string
          minLength: 10
        entrance_photo_url:
          type: string
          format: uri
        flat:
          type: string
        floor:
          type: string

    OrderItem:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        name:
          type: string
        quantity:
          type: number
        price:
          type: integer
        zone:
          type: string

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - NEW
            - ACCEPTED
            - AWAITING_PICKER
            - ASSEMBLY
            - READY
            - AWAITING_COURIER
            - IN_DELIVERY
            - DELIVERED
            - CANCELLED_BY_USER
            - CANCELLED_BY_SYSTEM
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        total_amount:
          type: integer
        delivery_fee:
          type: integer
        subtotal:
          type: integer
        darkstore_id:
          type: string
          format: uuid
        delivery_address:
          $ref: '#/components/schemas/DeliveryAddress'
        courier:
          type: object
          nullable: true
          properties:
            id:
              type: string
            name:
              type: string
            phone_masked:
              type: string
        eta_minutes:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

    Alert:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [sla_breach, low_stock, picker_offline]
        message:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
        created_at:
          type: string
          format: date-time

    Ticket:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [new, in_progress, escalated, resolved]
        priority:
          type: string
          enum: [critical, high, normal, low]
        type:
          type: string
        description:
          type: string
        customer_name:
          type: string
        created_at:
          type: string
          format: date-time
        sla_deadline:
          type: string
          format: date-time
