# Microservices + HPA (TZ §8.2) — apply per service namespace
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  labels:
    app: order
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
        - name: order
          image: jomboy/order:latest
          ports:
            - containerPort: 8102
          env:
            - name: PORT
              value: "8102"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: jomboy-db
                  key: url
          livenessProbe:
            httpGet:
              path: /health
              port: 8102
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8102
---
apiVersion: v1
kind: Service
metadata:
  name: order
spec:
  selector:
    app: order
  ports:
    - port: 8102
      targetPort: 8102
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
