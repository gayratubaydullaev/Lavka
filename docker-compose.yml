services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jomboy
      POSTGRES_PASSWORD: jomboy
      POSTGRES_DB: jomboy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jomboy -d jomboy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    profiles: ["prod-local"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  nats:
    profiles: ["prod-local"]
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  elasticsearch:
    profiles: ["prod-local"]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    profiles: ["prod-local"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: jomboy
      MINIO_ROOT_PASSWORD: jomboysecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  keycloak:
    profiles: ["prod-local"]
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8080"
    volumes:
      - ./deploy/keycloak/jomboy-realm.json:/opt/keycloak/data/import/jomboy-realm.json:ro
    ports:
      - "8080:8080"

  kong:
    profiles: ["prod-local"]
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./deploy/kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - catalog
      - order
      - picker
      - courier
      - billing
      - support
      - notification
      - admin-bff

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    environment:
      PORT: "4020"
      DATABASE_URL: postgres://jomboy:jomboy@postgres:5432/jomboy?sslmode=disable
      DEV_AUTH: "true"
    ports:
      - "4020:4020"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:4020/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 45s

  admin-bff:
    profiles: ["prod-local"]
    build:
      context: ./services
      dockerfile: admin-bff/Dockerfile
    environment:
      PORT: "8108"
      DATABASE_URL: postgres://jomboy:jomboy@postgres:5432/jomboy?sslmode=disable
      NATS_URL: nats://nats:4222
      DEV_AUTH: "true"
    ports:
      - "8108:8108"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8108/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  catalog:
    profiles: ["prod-local"]
    build:
      context: ./services
      dockerfile: Dockerfile.service
      args:
        SERVICE: catalog
        PORT: "8101"
    environment:
      PORT: "8101"
      DATABASE_URL: postgres://jomboy:jomboy@postgres:5432/jomboy?sslmode=disable
      ELASTICSEARCH_URL: http://elasticsearch:9200
      NATS_URL: nats://nats:4222
    ports:
      - "8101:8101"
    depends_on:
      postgres:
        condition: service_healthy
      admin-bff:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  order:
    profiles: ["prod-local"]
    build:
      context: ./services
      dockerfile: Dockerfile.service
      args:
        SERVICE: order
        PORT: "8102"
    environment:
      PORT: "8102"
      DATABASE_URL: postgres://jomboy:jomboy@postgres:5432/jomboy?sslmode=disable
      NATS_URL: nats://nats:4222
    ports:
      - "8102:8102"
    depends_on:
      postgres:
        condition: service_healthy
      admin-bff:
        condition: service_healthy
      nats:
        condition: service_started

  picker:
    profiles: ["prod-local"]
    build:
      context: ./services
      dockerfile: Dockerfile.service
      args:
        SERVICE: picker
        PORT: "8103"
    environment:
      PORT: "8103"
      NATS_URL: nats://nats:4222
    ports:
      - "8103:8103"

  courier:
    profiles: ["prod-local"]
    build:
      context: ./services
      dockerfile: Dockerfile.service
      args:
        SERVICE: courier
        PORT: "8104"
    environment:
      PORT: "8104"
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_ROOT_USER: jomboy
      MINIO_ROOT_PASSWORD: jomboysecret
    ports:
      - "8104:8104"
    depends_on:
      - minio

  minio-init:
    profiles: ["prod-local"]
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 jomboy jomboysecret;
      mc mb --ignore-existing local/jomboy;
      mc anonymous set download local/jomboy;
      echo minio ready;
      "

  billing:
    profiles: ["prod-local"]
    build:
      context: ./services
      dockerfile: Dockerfile.service
      args:
        SERVICE: billing
        PORT: "8105"
    environment:
      PORT: "8105"
      NATS_URL: nats://nats:4222
    ports:
      - "8105:8105"
    depends_on:
      nats:
        condition: service_started

  support:
    profiles: ["prod-local"]
    build:
      context: ./services
      dockerfile: Dockerfile.service
      args:
        SERVICE: support
        PORT: "8106"
    environment:
      PORT: "8106"
    ports:
      - "8106:8106"

  notification:
    profiles: ["prod-local"]
    build:
      context: ./services
      dockerfile: Dockerfile.service
      args:
        SERVICE: notification
        PORT: "8107"
    environment:
      PORT: "8107"
    ports:
      - "8107:8107"

  prometheus:
    profiles: ["prod-local", "observability"]
    image: prom/prometheus:v2.48.0
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    profiles: ["prod-local", "observability"]
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/jomboy-tz-dashboard.json:/var/lib/grafana/dashboards/jomboy-tz-dashboard.json:ro
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    depends_on:
      - prometheus

  mock:
    profiles: ["mock", "prod-local"]
    image: node:20-alpine
    working_dir: /app/packages/mock-server
    volumes:
      - .:/app
    command: node src/server.js
    environment:
      PORT: "4010"
    ports:
      - "4010:4010"

volumes:
  pgdata:
  miniodata:
