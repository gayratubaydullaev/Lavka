name: customer_flutter
description: Jomboy Lavka — customer mobile app (iOS + Android)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  web_socket_channel: ^3.0.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  geolocator: ^13.0.1
  image_picker: ^1.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.0
  webview_flutter: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
