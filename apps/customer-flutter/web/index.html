<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Jomboy Lavka — экспресс-доставка продуктов за 15 минут">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Jomboy Lavka</title>
  <link rel="manifest" href="manifest.json">

  <!-- Workaround: Flutter web negative viewInsets when keyboard dismisses (flutter/flutter#175074) -->
  <script>
    (function () {
      if (!window.visualViewport) return;

      var lastHeight = window.visualViewport.height;

      function syncViewport() {
        var vv = window.visualViewport;
        if (!vv) return;

        var height = vv.height;
        if (height >= lastHeight) {
          window.scrollTo(0, 0);
          document.documentElement.style.height = vv.height + 'px';
          document.body.style.height = vv.height + 'px';
          var pane = document.querySelector('flt-glass-pane');
          if (pane) {
            pane.style.height = vv.height + 'px';
          }
          window.dispatchEvent(new Event('resize'));
        }
        lastHeight = height;
      }

      window.visualViewport.addEventListener('resize', syncViewport);
      window.visualViewport.addEventListener('scroll', syncViewport);
      window.addEventListener('focusout', function () {
        setTimeout(syncViewport, 50);
      });
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
